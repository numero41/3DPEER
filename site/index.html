<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3DPEER — one 3D model, one file</title>
<link rel="stylesheet" href="site.css">
</head>
<body>
<header class="topbar">
  <span class="mark">3DPEER</span>
  <p class="tagline">one 3D model → one .html file. double-click, attach, offline. nothing leaves this browser.</p>
</header>

<main class="workbench">
  <section id="stage" class="stage">
    <canvas id="viewport"></canvas>

    <div id="dropzone" class="dropzone">
      <p class="drop-title">drop a .glb here</p>
      <label class="btn" for="file-input">or choose a file</label>
      <input id="file-input" type="file" accept=".glb,.gltf">
    </div>

    <div class="stage-tools">
      <button id="snapshot" class="icon-btn" title="save a snapshot" aria-label="snapshot">◐</button>
      <button id="fullscreen" class="icon-btn" title="fullscreen" aria-label="fullscreen">⛶</button>
    </div>

    <div class="stage-bar">
      <div class="seg" role="radiogroup" aria-label="display mode">
        <label><input type="radio" name="dmode" value="shaded" checked><span>shaded</span></label>
        <label><input type="radio" name="dmode" value="clay"><span>clay</span></label>
        <label><input type="radio" name="dmode" value="matcap"><span>matcap</span></label>
        <label><input type="radio" name="dmode" value="wire"><span>wire</span></label>
        <label><input type="radio" name="dmode" value="wireshaded"><span>wire+shaded</span></label>
      </div>
    </div>

    <p id="status" class="status">no file loaded</p>
  </section>

  <div class="toolbar">
    <div class="views" id="panel-views" aria-label="camera views">
      <button data-view="front">front</button>
      <button data-view="back">back</button>
      <button data-view="left">left</button>
      <button data-view="right">right</button>
      <button data-view="top">top</button>
      <button data-view="bottom">bottom</button>
      <button data-view="persp">persp</button>
    </div>
    <div class="export-group">
      <span class="export-note" title="v0: the glb is embedded as-is — adjustable compression comes next">v0 · uncompressed</span>
      <button id="export" class="btn-primary">export .html</button>
    </div>
  </div>

  <div class="panels">
    <section class="panel hidden" id="panel-anims">
      <h2>animations</h2>
      <select id="anim-select"></select>
      <div class="row">
        <button id="anim-toggle">play</button>
        <input id="anim-scrub" type="range" min="0" max="1" step="0.001" value="0">
      </div>
    </section>

    <section class="panel hidden" id="panel-morphs">
      <h2>morphs <span id="morph-count"></span></h2>
      <button id="morph-reset">reset</button>
      <div id="morph-list" class="scroll"></div>
    </section>

    <section class="panel hidden" id="panel-parts">
      <h2>parts</h2>
      <div id="part-list" class="scroll"></div>
    </section>
  </div>
</main>

<footer>
  <p>3DPEER · files never leave this browser · <span class="mark-sm">Number41</span></p>
</footer>

<script src="app.js"></script>
</body>
</html>
